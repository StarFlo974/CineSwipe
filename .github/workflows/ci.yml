name: CI → merge vers main

on:
  push:
    branches: [develop]

permissions:
  contents: write

jobs:
  tests:
    name: Tests & TypeScript
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci --legacy-peer-deps

      - name: Vérification TypeScript
        run: npx tsc --noEmit

      - name: Tests fonctionnels (46 cas)
        run: npm run test:ci

  merge-to-main:
    name: Merge develop → main
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurer git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merger develop dans main
        run: |
          git checkout main
          git merge develop --no-ff -m "chore: auto-merge develop → main [CI ✅]"
          git push origin main
